<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch — Style an Article</title>
  <link rel="stylesheet" href="scratch-style-article.css">
</head>
<body>
  <h1>Article Title</h1>
  <p id="author">By Jane Doe</p>
  <div class="content">
    <p>This is <span class="highlight">important</span> text here.</p>
    <p>This is <span>normal</span> text here.</p>
    <p>Another paragraph with <span class="highlight">key</span> info.</p>
  </div>
</body>
</html>
