<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partial — Tablet Layout</title>
  <link rel="stylesheet" href="partial-tablet.css">
</head>
<body>

  <h2>Responsive page</h2>
  <p>Resize the browser. The layout should change at 768px. Below 768px, the sidebar drops below the main content. You need to add the missing media query.</p>

  <div class="responsive-layout">
    <main class="main-col">
      <h3>Main Content</h3>
      <p>This is the primary content area. It takes up more space on desktop.</p>
    </main>
    <aside class="side-col">
      <h3>Sidebar</h3>
      <p>Additional info here.</p>
    </aside>
  </div>

</body>
</html>
