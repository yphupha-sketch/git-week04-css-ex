<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partial — Badge Overlay</title>
  <link rel="stylesheet" href="partial-badge.css">
</head>
<body>

  <h2>Task 1 — SOLD OUT badge</h2>
  <div class="product-card">
    <div class="product-card__badge">SOLD OUT</div>
    <img src="https://placehold.co/300x200" alt="product">
    <h3>Product Name</h3>
    <p>$49.99</p>
  </div>

  <hr>

  <h2>Task 2 — Tooltip on hover</h2>
  <div class="tooltip-trigger">
    Hover me
    <span class="tooltip-trigger__tip">This is a tooltip</span>
  </div>

  <hr>

  <h2>Task 3 — Back to top button</h2>
  <div class="scroll-area">
    <p>Scroll down to see the "Back to Top" button appear at the bottom-right, fixed to the viewport.</p>
    <p style="height: 600px; background: #eee;"></p>
    <a href="#" class="back-to-top">Top</a>
  </div>

</body>
</html>
