<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch — Testimonial Card</title>
  <link rel="stylesheet" href="scratch-testimonial.css">
</head>
<body>

  <div class="testimonial">
    <p class="testimonial__quote">"This product changed the way I work. Incredible experience from start to finish."</p>
    <div class="testimonial__author">
      <img class="testimonial__avatar" src="https://placehold.co/60" alt="Sarah">
      <div class="testimonial__info">
        <strong class="testimonial__name">Sarah Johnson</strong>
        <span class="testimonial__role">CEO, TechStart</span>
      </div>
    </div>
  </div>

</body>
</html>
