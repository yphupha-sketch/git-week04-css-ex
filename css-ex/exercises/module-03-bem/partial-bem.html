<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partial — BEM Blocks</title>
  <link rel="stylesheet" href="partial-bem.css">
</head>
<body>

  <h2>Task 1 — Profile card</h2>
  <div class="profile">
    <img class="profile__avatar" src="https://placehold.co/80" alt="avatar">
    <h3 class="profile__name">Alex Kim</h3>
    <p class="profile__bio">Full-stack developer</p>
    <button class="profile__btn profile__btn--follow">Follow</button>
  </div>

  <hr>

  <h2>Task 2 — Alert component</h2>
  <div class="alert alert--success">
    <h4 class="alert__title">Success!</h4>
    <p class="alert__msg">Your changes have been saved.</p>
  </div>
  <div class="alert alert--error">
    <h4 class="alert__title">Error!</h4>
    <p class="alert__msg">Something went wrong.</p>
  </div>

</body>
</html>
